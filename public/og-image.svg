<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFAFF" />
      <stop offset="100%" stop-color="#F3EEFB" />
    </linearGradient>
    <radialGradient id="blob1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#D8CCFF" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#D8CCFF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blob2" cx="0.85" cy="0.25" r="0.4">
      <stop offset="0%" stop-color="#FFCCD6" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#FFCCD6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blob3" cx="0.5" cy="0.95" r="0.5">
      <stop offset="0%" stop-color="#C6E0FA" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#C6E0FA" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F3EEFB" />
    </linearGradient>
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#7868BC" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#blob1)" />
  <rect width="1200" height="630" fill="url(#blob2)" />
  <rect width="1200" height="630" fill="url(#blob3)" />

  <!-- Decorative drifting cloud (top-left small) -->
  <g transform="translate(80 90) scale(0.6)" filter="url(#cloudShadow)">
    <path
      d="M50 132 C26 132 12 116 22 100 C6 96 10 72 30 70 C22 50 44 36 60 44 C66 24 96 18 106 36 C118 18 150 24 154 46 C180 38 204 56 198 78 C218 80 222 102 206 110 C224 118 214 142 188 134 L50 132 Z"
      fill="#FFFFFF"
    />
  </g>

  <!-- Decorative drifting cloud (top-right small, peach) -->
  <g transform="translate(960 70) scale(0.45)" filter="url(#cloudShadow)">
    <path
      d="M50 132 C26 132 12 116 22 100 C6 96 10 72 30 70 C22 50 44 36 60 44 C66 24 96 18 106 36 C118 18 150 24 154 46 C180 38 204 56 198 78 C218 80 222 102 206 110 C224 118 214 142 188 134 L50 132 Z"
      fill="#FFE7DC"
    />
  </g>

  <!-- Mascot cloud (center-left big) -->
  <g transform="translate(110 230) scale(1.6)" filter="url(#cloudShadow)">
    <path
      d="M50 132 C26 132 12 116 22 100 C6 96 10 72 30 70 C22 50 44 36 60 44 C66 24 96 18 106 36 C118 18 150 24 154 46 C180 38 204 56 198 78 C218 80 222 102 206 110 C224 118 214 142 188 134 L50 132 Z"
      fill="url(#cloud)"
    />
    <!-- Cheeks -->
    <ellipse cx="84" cy="92" rx="11" ry="6" fill="#FFB1C1" opacity="0.7" />
    <ellipse cx="160" cy="92" rx="11" ry="6" fill="#FFB1C1" opacity="0.7" />
    <!-- Eyes -->
    <circle cx="100" cy="80" r="4.6" fill="#2A2440" />
    <circle cx="146" cy="80" r="4.6" fill="#2A2440" />
    <!-- Smile -->
    <path
      d="M112 100 Q123 110 134 100"
      stroke="#2A2440"
      stroke-width="3.6"
      stroke-linecap="round"
      fill="none"
    />
  </g>

  <!-- Brand text -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', system-ui, sans-serif">
    <text x="540" y="270" font-size="74" font-weight="700" fill="#221C3D" letter-spacing="-2">
      몽글키즈
    </text>
    <text x="540" y="328" font-size="28" font-weight="500" fill="#65597E" letter-spacing="-0.5">
      MongleKids · AI Creative Growth for Kids
    </text>
    <text x="540" y="402" font-size="38" font-weight="600" fill="#221C3D" letter-spacing="-1">
      AI 시대 5–9세 아이의
    </text>
    <text x="540" y="450" font-size="38" font-weight="600" fill="#7868BC" letter-spacing="-1">
      창의 성장 동반자.
    </text>
    <text x="540" y="520" font-size="20" font-weight="500" fill="#7B6F95" letter-spacing="-0.3">
      monglekids.com
    </text>
  </g>

  <!-- Decorative star sparkles -->
  <circle cx="510" cy="180" r="5" fill="#FCDB81" />
  <circle cx="1080" cy="280" r="4" fill="#FCDB81" />
  <circle cx="900" cy="490" r="6" fill="#FFB1C1" />
  <circle cx="200" cy="540" r="4" fill="#A5CFF7" />
</svg>
