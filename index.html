<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Per-route <head> tags (title / description / og / canonical / JSON-LD)
         are injected by react-helmet-async at prerender time.
         The values below are fallbacks for the very first paint and for any
         crawler that bypasses the React tree. -->
    <title>몽글키즈 · AI 캐릭터와 소통하는 창의융합교육</title>
    <meta
      name="description"
      content="몽글키즈는 AI 캐릭터와 함께 소통하는 5–9세 창의융합교육 서비스입니다. 말하고, 만들고, 표현하는 놀이로 창의성 · 사고력 · 표현력 · 사회성 · 정서를 키워요."
    />

    <!-- Icons + theme color (real brand mascot) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#d09375" />
    <meta name="apple-mobile-web-app-title" content="몽글키즈" />
    <meta name="application-name" content="몽글키즈" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Korean color scheme + dark mode hint -->
    <meta name="color-scheme" content="light" />

    <!-- Brand fonts: 잘난체 (titles, @font-face in CSS) + 나눔스퀘어라운드 (body)
         + Quicksand (latin display labels) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://hangeul.pstatic.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
