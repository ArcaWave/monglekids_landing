<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Per-route <head> tags (title / description / og / canonical / JSON-LD)
         are injected by react-helmet-async at prerender time.
         The values below are fallbacks for the very first paint and for any
         crawler that bypasses the React tree. -->
    <title>몽글키즈 · AI 창의 성장 동반자</title>
    <meta
      name="description"
      content="몽글키즈는 5–9세 아이를 위한 AI 창의 성장 동반자입니다. STEAM · AI 교육, 4대 역량(창의 · 질문 · 표현 · 자기주도)을 매일의 미션으로 키우는 프리미엄 경험."
    />

    <!-- Icons + theme color -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/og-logo.svg" />
    <meta name="theme-color" content="#a594e6" />
    <meta name="apple-mobile-web-app-title" content="몽글키즈" />
    <meta name="application-name" content="몽글키즈" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Korean color scheme + dark mode hint -->
    <meta name="color-scheme" content="light" />

    <!-- Preconnect to font CDNs -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
